<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather UI</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./Weather.css">
</head>

<body class="bg-main text-white">

<div class="container-main">

  <div class="nav">
    <h1>Weather Now</h1>
    <button class="btn">Units</button>
  </div>

  <h2 class="title">How’s the sky looking today?</h2>

  <div class="search-box">
    <input type="text" placeholder="Search for a place...">
    <button class="search-btn">Search</button>
  </div>

  <div class="grid-main">

    <div class="left">

      <div class="main-card">
        <div>
          <h3>Berlin, Germany</h3>
          <p>Tuesday, Aug 5</p>
        </div>
        <h1>20°</h1>
      </div>

      <div class="stats">
        <div>Feels Like<br><b>18°</b></div>
        <div>Humidity<br><b>46%</b></div>
        <div>Wind<br><b>14 km/h</b></div>
        <div>Rain<br><b>0 mm</b></div>
      </div>

      <div class="daily">
        <h3>Daily forecast</h3>
        <div class="days">
          <div>Tue<br>20°</div>
          <div>Wed<br>21°</div>
          <div>Thu<br>24°</div>
          <div>Fri<br>25°</div>
          <div>Sat<br>21°</div>
        </div>
      </div>

    </div>

    <div class="right">
      <h3>Hourly forecast</h3>

      <div class="hour">3 PM <span>20°</span></div>
      <div class="hour">4 PM <span>20°</span></div>
      <div class="hour">5 PM <span>20°</span></div>
      <div class="hour">6 PM <span>19°</span></div>
      <div class="hour">7 PM <span>18°</span></div>
    </div>

  </div>

</div>

</body>
</html>
