         body{
            margin:0;
            background:#f4d04e;
            font-family:Arial, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .card{
            width:240px;
            background:#fff;
            border:2px solid black;
            border-radius:12px;
            overflow:hidden;
        }

        .card-img{
            width:100%;
            padding:10px;
            border-radius:12px;
            box-sizing:border-box;
        }

        .card-content{
            padding:12px;
        }

        .tag{
            background:#f4d04e;
            padding:4px 8px;
            font-size:11px;
            font-weight:bold;
            border-radius:4px;
            margin-bottom:8px;
        }

        .date{
            font-size:10px;
            color:#555;
        }

        h2{
            font-size:16px;
            margin:8px 0;
        }

        .desc{
            font-size:12px;
            color:#555;
            line-height:1.4;
        }

        .author{
            display:flex;
            align-items:center;
            margin-top:10px;
        }

        .author img{
            width:25px;
            height:25px;
            border-radius:50%;
            margin-right:8px;
        }

    </style>
</head>
<body>
    <body>

<div class="card">
    <img src="./Screenshot 2026-04-06 121510.png" class="card-img">

    <div class="card-content">
        <span class="tag">Learning</span>
        <p class="date">Published 21 Dec 2023</p>
        <h2>HTML & CSS foundations</h2>
        <p class="desc">
            These languages are the backbone of every website, defining structure, content, and presentation.
        </p>

            <div class="author">
            <img src="./githubprofile.png">
            <span>Greg Hooper</span>
            </div>
        </div>
    </div>

</body>

</body>
