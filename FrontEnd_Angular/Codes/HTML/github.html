<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

    body{
    margin:0;
    background:#141414;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    padding:40px 0;
}

.card{
    background:#1f1f1f;
    padding:25px;
    border-radius:15px;
    text-align:center;
    width:260px;
}

.avatar{
    width:70px;
    height:70px;
    border-radius:50%;
    margin-bottom:10px;
}

h2{
    font-size:18px;
    margin:8px 0 4px;
}

.location{
    color:green;
    font-size:12px;
    margin-bottom:12px;
}

.bio{
    font-size:12px;
    color:#ccc;
    margin-bottom:15px;
}

.buttons button{
    width:100%;
    padding:10px;
    margin:5px 0;
    background:#333;
    color:white;
    border:none;
    border-radius:8px;
    font-size:13px;
    cursor:pointer;
}

.buttons button:hover{
    background:green;
    color:black;
}
    </style>
</head>
<body>
    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile Card</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <img src="./githubprofile.png" class="avatar">

    <h2>Jess Randall</h2>
    <p class="location">London, United Kingdom</p>

    <p class="bio">"Front-end developer and avid reader."</p>

    <div class="buttons">
        <button>GitHub</button>
        <button>Frontend Mentor</button>
        <button>LinkedIn</button>
        <button>Twitter</button>
        <button>Instagram</button>
    </div>
</div>

</body>
</html>
</body>
</html>
