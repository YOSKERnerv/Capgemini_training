<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Doc</title>
</head>
<body>
    <center><h1>Please complete all the information below.</h1></center>    
    <fieldset>
        <legend><h1>Sign Up Here</h1></legend>
        <table align="center">
            <tr>
                <td>
                    <label for="name"><b>Name:</b></label>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="text" id="firstname" name="name" placeholder="First Name">
                </td>
                <td>
                    <input type="text" id="lastname" name="name" placeholder="Last Name">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="email"><b>Email:</b></label>
                </td>
                <td>
                    <label for="contact"><b>Contact:</b></label>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="email" id="email" name="email">
                </td>
                <td>
                    <input type="text" id="contact" minlength="10" maxlength="12">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="password"><b>Set Password:</b></label>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="password" minlength="6" id="password" name="password">
                </td>
            </tr>
            <tr>
                <td>
                    <label for="profile"></label>
                </td>
            </tr>
            <tr>
                <td>
                    <input type="file" id="profile" name="profile">
                </td>
            </tr>
            <tr>
                <td>
                    <input type="submit">
                </td>
            </tr>
        </table>
    </fieldset>
</body>
</html>
